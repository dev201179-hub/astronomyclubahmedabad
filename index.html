<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astronomy Club Ahmedabad</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
  scroll-behavior: smooth;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: sticky;
  top: 0;
  background: rgba(2,6,23,0.8);
  backdrop-filter: blur(10px);
}

nav a {
  color: #38bdf8;
  margin: 0 10px;
  text-decoration: none;
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.hero div {
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-size: 60px;
}

.btn {
  padding: 12px 24px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn:hover {
  background: #0ea5e9;
}

.section {
  padding: 80px 20px;
  text-align: center;
}

/* 🌌 Big Sky */
#sky {
  padding: 0;
}

#sky iframe {
  width: 100%;
  height: 80vh;
  border: none;
}

/* 📸 Slider */
.slider {
  width: 90%;
  max-width: 900px;
  overflow: hidden;
  margin: auto;
  border-radius: 12px;
}

.slides {
  display: flex;
  width: 400%;
  animation: slide 16s infinite;
}

.slides img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

.slides:hover {
  animation-play-state: paused;
}

@keyframes slide {
  0% { transform: translateX(0); }
  25% { transform: translateX(-100%); }
  50% { transform: translateX(-200%); }
  75% { transform: translateX(-300%); }
  100% { transform: translateX(0); }
}

/* Form */
form input {
  padding: 10px;
  width: 250px;
  border-radius: 6px;
  border: none;
  margin: 10px 0;
}

footer {
  padding: 20px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <h2>🌌 Astronomy Club Ahmedabad</h2>
  <nav>
    <a href="#sky">Sky</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Join</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Explore the Universe</h1>
    <button class="btn" onclick="scrollToJoin()">Join Now</button>
  </div>
</section>

<!-- SKY INFO -->
<section class="section">
  <h2>🌙 Tonight’s Sky</h2>
  <p>Moon: <span id="moon">Loading...</span></p>
  <p>Sunrise: <span id="sunrise">Loading...</span></p>
  <p>Sunset: <span id="sunset">Loading...</span></p>
</section>

<!-- LIVE SKY -->
<section id="sky">
  <iframe src="https://stellarium-web.org/?lat=23.0225&lng=72.5714&tz=Asia/Kolkata"></iframe>
</section>

<!-- GALLERY -->
<section id="gallery" class="section">
  <h2>📸 Space Gallery</h2>
  <div class="slider">
    <div class="slides">
      <img src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3">
      <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564">
      <img src="https://images.unsplash.com/photo-1473929733656-f9cfd8c8c8b0">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
    </div>
  </div>
</section>

<!-- JOIN -->
<section id="contact" class="section">
  <h2>Join Us</h2>
  <form>
    <input type="text" placeholder="Your Name" required><br>
    <input type="email" placeholder="Email" required><br>
    <button class="btn">Join Club</button>
  </form>
</section>

<footer>
  <p>© 2026 Astronomy Club Ahmedabad</p>
</footer>

<script>
// Smooth scroll
function scrollToJoin() {
  document.getElementById("contact").scrollIntoView({ behavior: "smooth" });
}

// 🌅 Sunrise & Sunset
fetch("https://api.sunrise-sunset.org/json?lat=23.0225&lng=72.5714&formatted=0")
  .then(res => res.json())
  .then(data => {
    document.getElementById("sunrise").innerText =
      new Date(data.results.sunrise).toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata" });

    document.getElementById("sunset").innerText =
      new Date(data.results.sunset).toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata" });
  });

// 🌙 Moon Phase + Age (NO API)
function getMoonData() {

  const today = new Date();
  const knownNewMoon = new Date("2024-01-11T00:00:00");

  const diffDays = (today - knownNewMoon) / (1000 * 60 * 60 * 24);
  const age = diffDays % 29.53;
  const roundedAge = age.toFixed(1);

  const illumination = Math.round(
    (1 - Math.cos((2 * Math.PI * age) / 29.53)) / 2 * 100
  );

  let phase = "";

  if (age < 1) phase = "New Moon 🌑";
  else if (age < 7) phase = "Waxing Crescent 🌒";
  else if (age < 8) phase = "First Quarter 🌓";
  else if (age < 14) phase = "Waxing Gibbous 🌔";
  else if (age < 16) phase = "Full Moon 🌕";
  else if (age < 22) phase = "Waning Gibbous 🌖";
  else if (age < 23) phase = "Last Quarter 🌗";
  else phase = "Waning Crescent 🌘";

  document.getElementById("moon").innerText =
    `${phase} | ${illumination}% illuminated | Age: ${roundedAge} days`;
}

getMoonData();
</script>

</body>
</html>
